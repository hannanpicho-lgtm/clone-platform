# Nginx vhost for TankPlatform staging
# Place in /etc/nginx/sites-available/staging.tankplatform-workbench.com.conf
# Then symlink to /etc/nginx/sites-enabled/

upstream tankplatform_staging_app {
    server 127.0.0.1:4001;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name staging.tankplatform-workbench.com;

    # Initial HTTP endpoint used before TLS is issued
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name staging.tankplatform-workbench.com;

    # Update paths if your certbot or ACME client stores certs elsewhere
    ssl_certificate /etc/letsencrypt/live/staging.tankplatform-workbench.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.tankplatform-workbench.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Reasonable upload limit for staging tests
    client_max_body_size 25m;

    # Basic auth is recommended for private review
    auth_basic "Staging - Private";
    auth_basic_user_file /etc/nginx/.htpasswd_tankplatform_staging;

    access_log /var/log/nginx/tankplatform-staging-access.log;
    error_log /var/log/nginx/tankplatform-staging-error.log;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;

        proxy_pass http://tankplatform_staging_app;
    }
}
